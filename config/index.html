  <body>
    <div id="root"></div>
    <script>
    // 隐藏"操作流水"模块
    (function() {
      const hideOps = () => {
        document.querySelectorAll('.ant-card-head-title').forEach(el => {
          if (el.textContent.includes('操作流水')) {
            const card = el.closest('.ant-card');
            if (card) card.style.display = 'none';
          }
        });
      };
      // DOM 变化监听，确保 React 渲染后也能隐藏
      const observer = new MutationObserver(() => hideOps());
      observer.observe(document.body, { childList: true, subtree: true });
      hideOps();
    })();
    </script>
  </body>
